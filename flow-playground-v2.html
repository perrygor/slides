<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Flow Blur v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#fff; display:flex; justify-content:center; align-items:center; min-height:100vh; }
.title-wrap { position:relative; display:inline-block; }
.title-wrap .title-clear,
.title-wrap .title-blur {
  font-family:'Inter','Noto Sans SC',sans-serif;
  font-size: clamp(56px, 8vw, 96px);
  font-weight: 900;
  letter-spacing: -0.02em;
  color: #000;
  white-space: nowrap;
}
.title-wrap .title-blur {
  position:absolute; top:0; left:0;
  filter: blur(12px);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.title-wrap:hover .title-blur { opacity:1; }
.debug {
  position:fixed; top:20px; left:20px;
  font:13px/1.6 monospace; color:#999;
  background:#f5f5f5; padding:12px 16px; border-radius:8px;
}
</style>
</head>
<body>
<div class="debug" id="dbg">hover over title ↓</div>
<div class="title-wrap" id="tw">
  <div class="title-clear">AI 时代产品方法论</div>
  <div class="title-blur" id="tblur">AI 时代产品方法论</div>
</div>
<script>
const tw = document.getElementById('tw');
const tblur = document.getElementById('tblur');
const dbg = document.getElementById('dbg');

// Track mouse and set radial gradient mask on blur layer
tw.addEventListener('mousemove', (e) => {
  const rect = tw.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  // Mask: transparent (clear) near mouse → black (blur) far away
  const R = 500;
  const CLEAR = 150;
  const grad = 'radial-gradient(circle '+R+'px at '+x+'px '+y+'px, transparent 0px, transparent '+CLEAR+'px, black '+R+'px)';
  tblur.style.maskImage = grad;
  tblur.style.webkitMaskImage = grad;
  dbg.textContent = 'x='+Math.round(x)+' y='+Math.round(y)+' | clear='+CLEAR+'px blur_outside='+R+'px';
});

tw.addEventListener('mouseleave', () => {
  tblur.style.maskImage = '';
  tblur.style.webkitMaskImage = '';
  dbg.textContent = 'hover over title ↓';
});
</script>
</body>
</html>
